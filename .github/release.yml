# GitHub Releases 分类规则
# 文档：https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
#
# 这些分类会显示在仓库主页右侧"📌 置顶"区域，让用户从仓库首页就能看到
changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
      - invalid
      - question
    authors:
      - dependabot
      - renovate
  categories:
    - title: 🚀 主要更新
      labels:
        - feature
        - enhancement
        - major
    - title: 🐛 Bug 修复
      labels:
        - bug
        - fix
        - regression
    - title: 📚 文档
      labels:
        - documentation
        - docs
    - title: 🔧 内部 / 重构
      labels:
        - chore
        - refactor
        - internal
    - title: 🎨 界面
      labels:
        - ui
        - style
        - design
    - title: ⚡ 性能
      labels:
        - performance
        - perf
    - title: 🧪 测试
      labels:
        - test
        - ci
    - title: 其他
      labels:
        - "*"
