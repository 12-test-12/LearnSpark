// ============================================================
//  LearnSpark · app/build.gradle 模板
//  修复 "packageinfo is null" 错误的结构化方案
//
//  关键点：
//  1. namespace 与 applicationId 都显式声明为 com.learnspark.app
//  2. minifyEnabled 保持 false（Capacitor 默认），避免 R8 误删反射类
//  3. signingConfigs 用 findProperty 保护，-P 参数未注入时也不崩溃
//  4. AndroidX 版本用字面量，不依赖根 build.gradle 的 ext 注入
//  5. 用 plugins DSL 而非老式 apply plugin（AGP 8.x 推荐）
//
//  严格遵循 Capacitor 6.1.2 官方模板结构
// ============================================================

plugins {
    id 'com.android.application'
}

android {
    namespace "com.learnspark.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.learnspark.app"
        minSdkVersion 22
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    // ===== 签名配置（从 -P 注入，findProperty 保护）=====
    signingConfigs {
        release {
            storeFile file(project.findProperty('KEYSTORE_FILE') ?: 'learnspark.keystore')
            storePassword project.findProperty('KEYSTORE_PASSWORD') ?: ''
            keyAlias project.findProperty('KEY_ALIAS') ?: 'learnspark'
            keyPassword project.findProperty('KEY_PASSWORD') ?: ''
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    // AndroidX 版本用字面量（不依赖根 build.gradle 的 ext 注入）
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
    implementation 'androidx.core:core-splashscreen:1.0.1'
    implementation project(':capacitor-android')
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    implementation project(':capacitor-cordova-android-plugins')
}

// ============================================================
// 关键：必须 apply capacitor.build.gradle！
// 该文件由 cap sync 生成，包含所有第三方 Capacitor 插件的依赖。
// 如果不 apply，会出现 "plugin is not implemented on android" 错误。
// 用 file.exists() 保护（cap sync 不一定会生成这个文件）。
// ============================================================
def capacitorBuildFile = file('capacitor.build.gradle')
if (capacitorBuildFile.exists()) {
    apply from: capacitorBuildFile
}
