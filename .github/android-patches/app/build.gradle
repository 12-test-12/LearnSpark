// ============================================================
//  LearnSpark · app/build.gradle 模板
//  修复 "packageinfo is null" 错误的结构化方案
//
//  关键点：
//  1. namespace 与 applicationId 都显式声明为 com.learnspark.app
//  2. minifyEnabled 保持 false（Capacitor 默认），避免 R8 误删反射类
//  3. signingConfigs 用 findProperty 保护，-P 参数未注入时也不崩溃
//  4. AndroidX 版本用字面量，不依赖根 build.gradle 的 ext 注入
//  5. 用 plugins DSL 而非老式 apply plugin（AGP 8.x 推荐）
//
//  严格遵循 Capacitor 6.1.2 官方模板结构
// ============================================================

plugins {
    id 'com.android.application'
}

android {
    namespace "com.learnspark.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.learnspark.app"
        minSdkVersion 22
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    // ===== 签名配置（从 -P 注入，findProperty 保护）=====
    signingConfigs {
        release {
            storeFile file(project.findProperty('KEYSTORE_FILE') ?: 'learnspark.keystore')
            storePassword project.findProperty('KEYSTORE_PASSWORD') ?: ''
            keyAlias project.findProperty('KEY_ALIAS') ?: 'learnspark'
            keyPassword project.findProperty('KEY_PASSWORD') ?: ''
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    // AndroidX 版本用字面量（不依赖根 build.gradle 的 ext 注入）
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'
    implementation 'androidx.core:core-splashscreen:1.0.1'
    implementation project(':capacitor-android')
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    implementation project(':capacitor-cordova-android-plugins')
}

// ============================================================
// 条件加载 capacitor.settings.gradle
// 该文件由 cap sync 在存在第三方 Capacitor 插件时生成。
// 当前项目只依赖 @capacitor/core + @capacitor/android（无插件），
// 所以 cap sync 不会生成此文件。这里用 file.exists() 保护，
// 避免文件不存在时 Gradle 评估失败。
// 将来如果引入 @capacitor/haptics 等插件，cap sync 会自动生成此文件，
// 这行 apply 也会自动生效，无需手动修改本模板。
// ============================================================
def capacitorSettingsFile = file('capacitor.settings.gradle')
if (capacitorSettingsFile.exists()) {
    apply from: capacitorSettingsFile
}
