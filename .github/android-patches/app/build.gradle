apply plugin: 'com.android.application'

// ============================================================
//  LearnSpark · app/build.gradle 模板
//  修复 "packageinfo is null" 错误的结构化方案
//
//  关键点：
//  1. namespace 与 applicationId 都显式声明为 com.learnspark.app
//  2. minifyEnabled 保持 false（Capacitor 默认），避免 R8 误删反射类
//  3. signingConfigs 用 findProperty 保护，-P 参数未注入时也不崩溃
//  4. buildTypes.release 显式引用 proguard-rules.pro
//
//  严格遵循 Capacitor 6.1.2 官方模板结构
// ============================================================

android {
    namespace "com.learnspark.app"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.learnspark.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    // ===== 签名配置（从 -P 注入，findProperty 保护）=====
    signingConfigs {
        release {
            storeFile file(project.findProperty('KEYSTORE_FILE') ?: 'learnspark.keystore')
            storePassword project.findProperty('KEYSTORE_PASSWORD') ?: ''
            keyAlias project.findProperty('KEY_ALIAS') ?: 'learnspark'
            keyPassword project.findProperty('KEY_PASSWORD') ?: ''
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$androidxCoreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxExtJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.settings.gradle'
