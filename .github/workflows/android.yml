name: Build Android APK

# ============================================================
# 触发条件：
#  - push 到 main / master 分支：构建 + 上传 Artifact（调试用）
#  - 推送 v* 标签（如 v1.0.0）：构建 + 上传 Artifact + 创建 Release
#  - 手动触发（workflow_dispatch）：可选生成签名版
# ============================================================
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_build:
        description: '构建 Release 版（需要配置签名 Secrets）'
        type: boolean
        default: true

# 创建 Release 需要写权限
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ---------- 基础环境 ----------
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 设置 JDK 17（Capacitor 6 / AGP 8 要求）
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK（compileSdk 34）
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'
          ndk-version: '26.1.10909125'

      # ---------- 前端构建 ----------
      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 构建前端（Capacitor 用相对路径）
        working-directory: frontend
        run: npx vite build --base=./ --outDir=dist
        env:
          # 后端 API 地址（按需配置）
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: 验证 dist 产物
        working-directory: frontend
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ dist/index.html 未生成"
            exit 1
          fi
          echo "✓ dist 已生成："
          ls -lh dist/ | head -20

      # ---------- Capacitor 初始化 ----------
      - name: 添加 Android 平台（首次自动生成）
        working-directory: frontend
        run: |
          if [ ! -d android ]; then
            echo "▶ 首次构建，执行 cap add android"
            npx cap add android
          else
            echo "✓ android 目录已存在，跳过 add"
          fi

      - name: 同步 Web 资源到 Android
        working-directory: frontend
        run: npx cap sync android

      # ---------- 签名注入 ----------
      - name: 注入 Keystore
        working-directory: frontend/android
        run: |
          set -e
          KEYSTORE_PATH=app/learnspark.keystore
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
            echo "✓ 使用 Secrets 中的签名 keystore"
          else
            echo "⚠ 未配置 ANDROID_KEYSTORE_BASE64，生成临时 keystore（仅供调试）"
            mkdir -p app
            keytool -genkeypair -noprompt \
              -keystore "$KEYSTORE_PATH" \
              -alias learnspark \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass learnspark123 -keypass learnspark123 \
              -dname "CN=LearnSpark,O=LearnSpark,L=Local,C=CN"
          fi

      - name: 注入签名配置到 build.gradle
        working-directory: frontend/android
        run: |
          set -e
          GRADLE=app/build.gradle

          # ---------- 1) 准备签名块（4 空格缩进，作为 android { 的子块）----------
          # AGP 8.x 要求 signingConfigs 必须是 android {} 块的子节点
          cat > /tmp/__sign_block__.gradle <<'SIGNBLOCK'
              signingConfigs {
                  release {
                      if (project.hasProperty("KEYSTORE_FILE")) {
                          storeFile file(KEYSTORE_FILE)
                          storePassword KEYSTORE_PASSWORD
                          keyAlias KEY_ALIAS
                          keyPassword KEY_PASSWORD
                      }
                  }
              }
          SIGNBLOCK

          # ---------- 2) 定位到原 android { 块（确保在 plugins 块之后）----------
          ANDROID_LINE=$(grep -nE '^[[:space:]]*android[[:space:]]*\{[[:space:]]*$' "$GRADLE" | head -n1 | cut -d: -f1)

          if [ -z "$ANDROID_LINE" ]; then
            echo "❌ 未找到 android { 块，请检查 $GRADLE 结构"
            exit 1
          fi
          echo "▶ 找到 android { 块在第 $ANDROID_LINE 行"

          # ---------- 3) 在 android { 行的下一行插入签名子块（去重）----------
          if grep -q "storePassword KEYSTORE_PASSWORD" "$GRADLE"; then
            echo "✓ 签名配置已存在，跳过注入"
          else
            head -n "$ANDROID_LINE" "$GRADLE" > /tmp/__part1__.gradle
            tail -n +$((ANDROID_LINE + 1)) "$GRADLE" > /tmp/__part2__.gradle
            cat /tmp/__part1__.gradle /tmp/__sign_block__.gradle /tmp/__part2__.gradle > "$GRADLE"
            echo "✓ signingConfigs { release { ... } } 已作为 android { 的第一个子块插入"
          fi

          # ---------- 4) 把 release 的 signingConfig 从 debug 改为 release ----------
          sed -i 's|signingConfig[[:space:]]\+signingConfigs\.debug|signingConfig signingConfigs.release|g' "$GRADLE"
          echo "✓ 已将 buildTypes.release 的 signingConfig 指向 release"

          # ---------- 5) 校验 ----------
          echo "===== build.gradle 头部预览（前 30 行）====="
          head -30 "$GRADLE"
          echo ""
          echo "===== signingConfigs / signingConfig 引用 ====="
          grep -nE "signingConfig" "$GRADLE" || echo "(未找到)"

      # ---------- Gradle 构建 ----------
      - name: 启用 Gradle 缓存
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}

      - name: 构建 Release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_FILE: learnspark.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'learnspark123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'learnspark' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'learnspark123' }}

      - name: 构建 Release AAB（Google Play 上架）
        working-directory: frontend/android
        run: ./gradlew bundleRelease --no-daemon --stacktrace || echo "⚠ AAB 构建失败，可忽略"
        env:
          KEYSTORE_FILE: learnspark.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'learnspark123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'learnspark' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'learnspark123' }}

      # ---------- 产物处理 ----------
      - name: 汇总构建产物
        working-directory: frontend/android
        run: |
          echo "===== APK ====="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo "===== AAB ====="
          find app/build/outputs/bundle -name "*.aab" -exec ls -lh {} \; || true
          echo "===== 总大小 ====="
          du -sh app/build/outputs/apk app/build/outputs/bundle 2>/dev/null || true

      - name: 重命名产物（含版本号）
        working-directory: frontend/android
        run: |
          VERSION="${GITHUB_REF_NAME:-${GITHUB_SHA::7}}"
          [ -z "$VERSION" ] && VERSION="dev"
          cd app/build/outputs/apk/release
          for f in *.apk; do
            [ -f "$f" ] && mv "$f" "learnspark-${VERSION}.apk"
          done
          cd ../../bundle/release 2>/dev/null || exit 0
          for f in *.aab; do
            [ -f "$f" ] && mv "$f" "learnspark-${VERSION}.aab"
          done
          echo "✓ 已重命名为 learnspark-${VERSION}.{apk,aab}"

      - name: 上传 Artifact（任意触发均可下载）
        uses: actions/upload-artifact@v4
        with:
          name: learnspark-android-${{ github.sha }}
          path: |
            frontend/android/app/build/outputs/apk/release/*.apk
            frontend/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: 创建 GitHub Release（仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: '📱 LearnSpark ${{ github.ref_name }}'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            frontend/android/app/build/outputs/apk/release/*.apk
            frontend/android/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建摘要
        if: always()
        run: |
          echo "## 📱 Android 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 类型 | 路径 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in frontend/android/app/build/outputs/apk/release/*.apk; do
            [ -f "$f" ] && echo "| APK | \`$f\` | ✅ |" >> $GITHUB_STEP_SUMMARY
          done
          for f in frontend/android/app/build/outputs/bundle/release/*.aab; do
            [ -f "$f" ] && echo "| AAB | \`$f\` | ✅ |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 [下载最新版本](../../releases/latest)" >> $GITHUB_STEP_SUMMARY
