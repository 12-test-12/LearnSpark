name: Build Android APK

# ============================================================
# 触发条件：
#  - push 到 main / master 分支：构建 + 上传 Artifact（调试用）
#  - 推送 v* 标签（如 v1.0.0）：构建 + 上传 Artifact + 创建 Release
#  - 手动触发（workflow_dispatch）：可选生成签名版
# ============================================================
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_build:
        description: '构建 Release 版（需要配置签名 Secrets）'
        type: boolean
        default: true

# 创建 Release 需要写权限
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ---------- 基础环境 ----------
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 设置 JDK 17（Capacitor 6 / AGP 8 要求）
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Android SDK（compileSdk 34）
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'
          ndk-version: '26.1.10909125'

      # ---------- 前端构建 ----------
      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 构建前端（Capacitor 用相对路径 + 禁用 PWA Service Worker）
        working-directory: frontend
        run: npm run build:android

      - name: 验证 dist 产物
        working-directory: frontend
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ dist/index.html 未生成"
            exit 1
          fi
          echo "✓ dist 已生成："
          ls -lh dist/ | head -20

      # ---------- Capacitor 初始化 ----------
      - name: 添加 Android 平台（首次自动生成）
        working-directory: frontend
        run: |
          if [ ! -d android ]; then
            echo "▶ 首次构建，执行 cap add android"
            npx cap add android
          else
            echo "✓ android 目录已存在，跳过 add"
          fi

      - name: 同步 Web 资源到 Android
        working-directory: frontend
        run: npx cap sync android

      # ---------- 签名注入 ----------
      - name: 注入 Keystore
        working-directory: frontend/android
        run: |
          set -e
          KEYSTORE_PATH=app/learnspark.keystore
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
            echo "✓ 使用 Secrets 中的签名 keystore"
          else
            echo "⚠ 未配置 ANDROID_KEYSTORE_BASE64，生成临时 keystore（仅供调试）"
            mkdir -p app
            keytool -genkeypair -noprompt \
              -keystore "$KEYSTORE_PATH" \
              -alias learnspark \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass learnspark123 -keypass learnspark123 \
              -dname "CN=LearnSpark,O=LearnSpark,L=Local,C=CN"
          fi

      # ---------- 修复"packageinfo is null"问题 ----------
      - name: 应用 Android 补丁（修复 packageinfo is null）
        working-directory: frontend/android
        run: |
          set -e
          PATCH_DIR="../../.github/android-patches"
          APP_DIR="app"
          RES_DIR="$APP_DIR/src/main/res"

          echo "===== 1) 覆盖 AndroidManifest.xml ====="
          cp "$PATCH_DIR/AndroidManifest.xml" "$APP_DIR/src/main/AndroidManifest.xml"
          echo "✓ AndroidManifest.xml 已覆盖"
          # 校验关键修复点
          grep -q 'package="com.learnspark.app"' "$APP_DIR/src/main/AndroidManifest.xml" && \
            echo "  ✓ 显式 package 属性已添加" || echo "  ✗ package 属性缺失！"
          grep -q 'android:exported="true"' "$APP_DIR/src/main/AndroidManifest.xml" && \
            echo "  ✓ exported=true 已声明" || echo "  ✗ exported 缺失！"
          grep -q '<queries>' "$APP_DIR/src/main/AndroidManifest.xml" && \
            echo "  ✓ <queries> 块已添加" || echo "  ✗ <queries> 缺失！"

          echo ""
          echo "===== 2) 拷贝 res/xml 资源 ====="
          mkdir -p "$RES_DIR/xml"
          cp "$PATCH_DIR/res/xml/network_security_config.xml" "$RES_DIR/xml/"
          cp "$PATCH_DIR/res/xml/file_paths.xml" "$RES_DIR/xml/"
          echo "✓ network_security_config.xml + file_paths.xml 已就位"

          echo ""
          echo "===== 3) 覆盖 ProGuard 规则 ====="
          # Capacitor 6 默认 app/proguard-rules.pro 已存在，直接覆盖
          if [ -f "$APP_DIR/proguard-rules.pro" ]; then
            cp "$PATCH_DIR/proguard-rules.pro" "$APP_DIR/proguard-rules.pro"
            echo "✓ proguard-rules.pro 已覆盖（保留 Capacitor / WebView 类）"
          else
            echo "⚠ proguard-rules.pro 不存在，将由 build.gradle 自动生成"
          fi

          echo ""
          echo "===== 4) 校验 namespace 与 applicationId 一致 ====="
          # namespace 在 build.gradle，applicationId 在 defaultConfig 里
          NS=$(grep -E "namespace\s+\"" "$APP_DIR/build.gradle" | head -1 | grep -oE '"[^"]+"' | tr -d '"' || echo "")
          APPID=$(grep -E "applicationId\s+\"" "$APP_DIR/build.gradle" | head -1 | grep -oE '"[^"]+"' | tr -d '"' || echo "")
          echo "  namespace:     $NS"
          echo "  applicationId: $APPID"
          if [ -n "$NS" ] && [ -n "$APPID" ] && [ "$NS" = "$APPID" ]; then
            echo "  ✓ namespace 和 applicationId 一致"
          else
            echo "  ⚠ namespace 和 applicationId 不一致，尝试修复"
            # 自动修正：把 applicationId 改成 namespace
            sed -i "s|applicationId[[:space:]]*\"[^\"]*\"|applicationId \"$NS\"|g" "$APP_DIR/build.gradle"
            echo "  ✓ applicationId 已对齐为 $NS"
          fi

          echo ""
          echo "===== 5) 确保 buildTypes.release 启用 minify + 引用 proguard-rules ====="
          # 检查并启用 R8/ProGuard（避免 R8 错误移除 Capacitor 类）
          if grep -q "minifyEnabled" "$APP_DIR/build.gradle"; then
            sed -i 's|minifyEnabled[[:space:]]*false|minifyEnabled true|g' "$APP_DIR/build.gradle"
            echo "  ✓ minifyEnabled 已启用为 true"
          else
            # 在 buildTypes { release { ... } } 块里插入
            sed -i '/buildTypes[[:space:]]*{/,/^[[:space:]]*}/ {
              /release[[:space:]]*{/a\
              \            minifyEnabled true\
              \            shrinkResources true\
              \            proguardFiles getDefaultProguardFile('"'"'proguard-android-optimize.txt'"'"'), '"'"'proguard-rules.pro'"'"'
            }' "$APP_DIR/build.gradle"
            echo "  ✓ minifyEnabled + proguardFiles 已注入"
          fi

          # 检查 proguardFiles 是否被引用
          if ! grep -q "proguard-rules.pro" "$APP_DIR/build.gradle"; then
            echo "  ⚠ 未引用 proguard-rules.pro，请检查"
          else
            echo "  ✓ proguard-rules.pro 已被引用"
          fi

      - name: 注入签名配置到 build.gradle
        working-directory: frontend/android
        run: |
          set -e
          GRADLE=app/build.gradle

          # ---------- 1) 准备签名块（4 空格缩进，作为 android { 的子块）----------
          # AGP 8.x 要求 signingConfigs 必须是 android {} 块的子节点
          cat > /tmp/__sign_block__.gradle <<'SIGNBLOCK'
              signingConfigs {
                  release {
                      if (project.hasProperty("KEYSTORE_FILE")) {
                          storeFile file(KEYSTORE_FILE)
                          storePassword KEYSTORE_PASSWORD
                          keyAlias KEY_ALIAS
                          keyPassword KEY_PASSWORD
                      }
                  }
              }
          SIGNBLOCK

          # ---------- 2) 定位到原 android { 块（确保在 plugins 块之后）----------
          ANDROID_LINE=$(grep -nE '^[[:space:]]*android[[:space:]]*\{[[:space:]]*$' "$GRADLE" | head -n1 | cut -d: -f1)

          if [ -z "$ANDROID_LINE" ]; then
            echo "❌ 未找到 android { 块，请检查 $GRADLE 结构"
            exit 1
          fi
          echo "▶ 找到 android { 块在第 $ANDROID_LINE 行"

          # ---------- 3) 在 android { 行的下一行插入签名子块（去重）----------
          if grep -q "storePassword KEYSTORE_PASSWORD" "$GRADLE"; then
            echo "✓ 签名配置已存在，跳过注入"
          else
            head -n "$ANDROID_LINE" "$GRADLE" > /tmp/__part1__.gradle
            tail -n +$((ANDROID_LINE + 1)) "$GRADLE" > /tmp/__part2__.gradle
            cat /tmp/__part1__.gradle /tmp/__sign_block__.gradle /tmp/__part2__.gradle > "$GRADLE"
            echo "✓ signingConfigs { release { ... } } 已作为 android { 的第一个子块插入"
          fi

          # ---------- 4) 把 release 的 signingConfig 从 debug 改为 release ----------
          sed -i 's|signingConfig[[:space:]]\+signingConfigs\.debug|signingConfig signingConfigs.release|g' "$GRADLE"
          echo "✓ 已将 buildTypes.release 的 signingConfig 指向 release"

          # ---------- 5) 校验 ----------
          echo "===== build.gradle 头部预览（前 30 行）====="
          head -30 "$GRADLE"
          echo ""
          echo "===== signingConfigs / signingConfig 引用 ====="
          grep -nE "signingConfig" "$GRADLE" || echo "(未找到)"

      # ---------- Gradle 构建 ----------
      - name: 启用 Gradle 缓存
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}

      - name: 构建 Release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_FILE: learnspark.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'learnspark123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'learnspark' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'learnspark123' }}

      - name: 构建 Release AAB（Google Play 上架）
        working-directory: frontend/android
        run: ./gradlew bundleRelease --no-daemon --stacktrace || echo "⚠ AAB 构建失败，可忽略"
        env:
          KEYSTORE_FILE: learnspark.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'learnspark123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'learnspark' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'learnspark123' }}

      # ---------- APK 验证（关键！提前发现"packageinfo is null"等签名/manifest 问题）----------
      - name: 验证 APK 签名 & manifest（提前发现问题）
        working-directory: frontend/android
        run: |
          set -e
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ 未找到 APK，跳过验证"
            exit 1
          fi
          echo "▶ 验证 APK: $APK"
          echo ""

          # ---------- 1) 验证 APK 文件完整性 ----------
          echo "===== 1) APK 完整性 ====="
          ls -lh "$APK"
          file "$APK" 2>/dev/null || echo "file 命令不可用"
          echo ""

          # ---------- 2) 用 aapt 解析 manifest（核心验证）----------
          echo "===== 2) Manifest 信息（确认修复生效）====="
          AAPT="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)/aapt2"
          if [ -x "$AAPT" ]; then
            "$AAPT" dump badging "$APK" 2>/dev/null | head -20 || echo "(aapt2 不可用)"
            echo ""

            # 关键校验：package / launcher activity / exported
            echo "----- 关键 manifest 字段 -----"
            "$AAPT" dump xmltree "$APK" --file AndroidManifest.xml 2>/dev/null | \
              grep -E "package=|MainActivity|exported" | head -20 || echo "(解析失败)"
          else
            echo "⚠ aapt2 不在标准路径"
          fi
          echo ""

          # ---------- 3) 验证签名 ----------
          echo "===== 3) APK 签名 ====="
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)/apksigner"
          if [ -x "$APKSIGNER" ]; then
            "$APKSIGNER" verify --verbose --print-certs "$APK" 2>&1 | head -30 || true
          else
            echo "⚠ apksigner 不在标准路径"
          fi
          echo ""

          # ---------- 4) 用 unzip 看下 APK 内容是否完整 ----------
          echo "===== 4) APK 内关键文件 ====="
          unzip -l "$APK" 2>/dev/null | grep -E "AndroidManifest|classes\.dex|assets/public|res/xml/" | head -20 || echo "(unzip 不可用)"
          echo ""

          # ---------- 5) 总结 ----------
          echo "===== ✅ 验证完成 ====="
          echo "如果上面看到："
          echo "  • package='com.learnspark.app'         ← namespace 正确"
          echo "  • MainActivity android:exported='true'  ← Android 12+ 兼容"
          echo "  • apk 包含 res/xml/network_security_config.xml  ← WebView 证书修复"
          echo "  • Verified using v1/v2/v3 scheme      ← 签名有效"
          echo "则 APK 可以正常安装使用"

      # ---------- 产物处理 ----------
      - name: 汇总构建产物
        working-directory: frontend/android
        run: |
          echo "===== APK ====="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo "===== AAB ====="
          find app/build/outputs/bundle -name "*.aab" -exec ls -lh {} \; || true
          echo "===== 总大小 ====="
          du -sh app/build/outputs/apk app/build/outputs/bundle 2>/dev/null || true

      - name: 重命名产物（含版本号）
        working-directory: frontend/android
        run: |
          VERSION="${GITHUB_REF_NAME:-${GITHUB_SHA::7}}"
          [ -z "$VERSION" ] && VERSION="dev"
          cd app/build/outputs/apk/release
          for f in *.apk; do
            [ -f "$f" ] && mv "$f" "learnspark-${VERSION}.apk"
          done
          cd ../../bundle/release 2>/dev/null || exit 0
          for f in *.aab; do
            [ -f "$f" ] && mv "$f" "learnspark-${VERSION}.aab"
          done
          echo "✓ 已重命名为 learnspark-${VERSION}.{apk,aab}"

      - name: 上传 Artifact（任意触发均可下载）
        uses: actions/upload-artifact@v4
        with:
          name: learnspark-android-${{ github.sha }}
          path: |
            frontend/android/app/build/outputs/apk/release/*.apk
            frontend/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: 创建 GitHub Release（push 就有 release，零门槛）
        if: always() && (hashFiles('frontend/android/app/build/outputs/apk/release/*.apk') != '')
        uses: softprops/action-gh-release@v2
        with:
          # tag 触发：用 tag 名；分支触发：自动生成 build-{date}-{sha}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}-{1}', github.event.repository.default_branch, github.sha) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('📱 LearnSpark {0}', github.ref_name) || format('🔧 Build {0}', github.sha) }}
          # 自动生成更新日志
          generate_release_notes: true
          # 关键：让 release 默认可见（不是 draft，也不是 prerelease）
          draft: false
          prerelease: false
          # 标记正式版（v* tag 推送）vs 开发版（main push）
          target_commitish: ${{ github.sha }}
          # 上传所有 APK + AAB
          files: |
            frontend/android/app/build/outputs/apk/release/*.apk
            frontend/android/app/build/outputs/bundle/release/*.aab
          # 友好的 body
          body: |
            ## 📱 LearnSpark Android App

            ### ⬇️ 下载

            | 文件 | 大小 | 用途 |
            |---|---|---|
            | `learnspark-*.apk` | ~8 MB | 直接安装到 Android 设备 |
            | `learnspark-*.aab` | ~8 MB | 上传到 Google Play |

            ### 📲 安装步骤

            1. 下载 `learnspark-*.apk`
            2. 在 Android 设备上点击 APK
            3. 允许"来自此来源的安装"
            4. 按提示完成安装

            > 同签名版本可直接覆盖升级，不会丢失数据

            ---

            🤖 由 GitHub Actions 自动构建 · 提交 `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建摘要
        if: always()
        run: |
          echo "## 📱 Android 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 类型 | 路径 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in frontend/android/app/build/outputs/apk/release/*.apk; do
            [ -f "$f" ] && echo "| APK | \`$f\` | ✅ |" >> $GITHUB_STEP_SUMMARY
          done
          for f in frontend/android/app/build/outputs/bundle/release/*.aab; do
            [ -f "$f" ] && echo "| AAB | \`$f\` | ✅ |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 [下载最新版本](../../releases/latest)" >> $GITHUB_STEP_SUMMARY
