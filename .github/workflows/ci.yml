name: CI Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:        # 允许手动触发（即使 push 后也想再跑一次）

jobs:
  # ---------- Job 1: Windows EXE ----------
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clear Gradle dependency cache (workaround for upstream 502)
        shell: bash
        run: |
          # 上次 502 失败会被 Gradle 缓存 24 小时，清掉才能重试
          rm -rf ~/.gradle/caches/modules-2/metadata-* 2>/dev/null || true
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/manifest-merger 2>/dev/null || true
          echo "Cache cleared"

      - name: Grant execute permission for gradlew
        shell: bash
        working-directory: learnspark-kmp
        run: chmod +x gradlew

      - name: Package Desktop (EXE)
        shell: bash
        working-directory: learnspark-kmp
        run: ./gradlew.bat :composeApp:packageExe --no-daemon

      - name: Locate EXE artifact
        shell: bash
        run: |
          echo "=== EXE ==="
          find learnspark-kmp/composeApp/build/compose/binaries/main -name "*.exe" -type f
          echo "=== EXE directory tree ==="
          ls -laR learnspark-kmp/composeApp/build/compose/binaries/main/exe/ 2>/dev/null || true

      - name: Copy EXE to stable path
        shell: bash
        run: |
          cd learnspark-kmp/composeApp/build/compose/binaries/main
          EXE_FILE=$(find . -name "LearnSpark.exe" -type f | head -1)
          if [ -z "$EXE_FILE" ]; then
            EXE_FILE=$(find . -name "*.exe" -type f | head -1)
          fi
          echo "Found EXE: $EXE_FILE"
          if [ -n "$EXE_FILE" ]; then
            cp "$EXE_FILE" "LearnSpark-1.0.0.exe"
            ls -la "LearnSpark-1.0.0.exe"
          else
            echo "ERROR: No EXE found, listing build dir:"
            ls -laR learnspark-kmp/composeApp/build/compose/binaries/main/
            exit 1
          fi

      - name: Upload Desktop EXE
        uses: actions/upload-artifact@v5
        with:
          name: learnspark-desktop-exe
          path: learnspark-kmp/composeApp/build/compose/binaries/main/LearnSpark-1.0.0.exe
          if-no-files-found: error

  # ---------- Job 2: Android APK ----------
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clear Gradle dependency cache (workaround for upstream 502)
        run: |
          rm -rf ~/.gradle/caches/modules-2/metadata-* 2>/dev/null || true
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/manifest-merger 2>/dev/null || true
          echo "Cache cleared"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: learnspark-kmp
        run: chmod +x gradlew

      - name: Assemble Debug APK
        working-directory: learnspark-kmp
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Locate APK
        run: |
          find learnspark-kmp/composeApp/build/outputs/apk/debug -name "*.apk" -type f
          ls -la learnspark-kmp/composeApp/build/outputs/apk/debug/ 2>/dev/null || true

      - name: Copy APK with version
        run: |
          cd learnspark-kmp/composeApp/build/outputs/apk/debug
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "LearnSpark-1.0.0.apk"
            ls -la "LearnSpark-1.0.0.apk"
          else
            echo "ERROR: No APK produced, listing outputs tree:"
            ls -laR learnspark-kmp/composeApp/build/outputs/ 2>/dev/null || true
            exit 1
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v5
        with:
          name: learnspark-android-apk
          path: learnspark-kmp/composeApp/build/outputs/apk/debug/LearnSpark-1.0.0.apk
          if-no-files-found: error

  # ---------- Job 3: Linux Desktop (DEB + tar.gz) ----------
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clear Gradle dependency cache (workaround for upstream 502)
        run: |
          rm -rf ~/.gradle/caches/modules-2/metadata-* 2>/dev/null || true
          rm -rf ~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/manifest-merger 2>/dev/null || true
          echo "Cache cleared"

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Grant execute permission for gradlew
        working-directory: learnspark-kmp
        run: chmod +x gradlew

      # 先显式触发 createDistributable，确保 app/ 目录生成（packageDeb 也依赖它，但显式调用更可靠）
      - name: Create distributable
        working-directory: learnspark-kmp
        run: ./gradlew :composeApp:createDistributable --no-daemon

      - name: Verify app directory exists
        run: |
          echo "=== app/ directory ==="
          ls -la learnspark-kmp/composeApp/build/compose/binaries/main/app/ 2>/dev/null || true
          echo "=== full binaries tree (top 3 levels) ==="
          find learnspark-kmp/composeApp/build/compose/binaries/main -maxdepth 3 -type d 2>/dev/null || true

      - name: Package Linux DEB
        working-directory: learnspark-kmp
        run: ./gradlew :composeApp:packageDeb --no-daemon

      - name: Locate Linux artifacts
        run: |
          echo "=== DEB ==="
          find learnspark-kmp/composeApp/build/compose/binaries/main -name "*.deb" -type f
          echo "=== App distributable dir ==="
          ls -la learnspark-kmp/composeApp/build/compose/binaries/main/app/ 2>/dev/null || true

      - name: Copy Linux DEB to stable name
        run: |
          cd learnspark-kmp/composeApp/build/compose/binaries/main
          DEB_FILE=$(find . -name "*.deb" -type f | head -1)
          if [ -n "$DEB_FILE" ]; then
            cp "$DEB_FILE" "LearnSpark-1.0.0.deb"
            ls -la "LearnSpark-1.0.0.deb"
          else
            echo "WARN: no DEB produced, listing build dir:"
            ls -laR learnspark-kmp/composeApp/build/compose/binaries/main/
          fi

      # Compose Multiplatform 没有内置的 tar.gz 任务，手动从 app 目录打包
      - name: Create tar.gz from distributable
        run: |
          cd learnspark-kmp/composeApp/build/compose/binaries/main
          # createDistributable 会在 app/<package-name>/ 生成可运行目录
          APP_DIR=$(find app -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -1)
          if [ -n "$APP_DIR" ]; then
            tar -czf "LearnSpark-1.0.0-linux.tar.gz" "$APP_DIR"
            echo "Created tar.gz:"
            ls -la "LearnSpark-1.0.0-linux.tar.gz"
          else
            echo "ERROR: no app directory found, listing build tree:"
            ls -laR . | head -80
            exit 1
          fi

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v5
        with:
          name: learnspark-linux-deb
          path: learnspark-kmp/composeApp/build/compose/binaries/main/LearnSpark-1.0.0.deb
          if-no-files-found: warn

      - name: Upload Linux tar.gz
        uses: actions/upload-artifact@v5
        with:
          name: learnspark-linux-tar
          path: learnspark-kmp/composeApp/build/compose/binaries/main/LearnSpark-1.0.0-linux.tar.gz
          if-no-files-found: error

  # ---------- Release：只要构建成功就发到 GitHub Releases ----------
  # 触发条件：push 到 master / push tag v* / workflow_dispatch
  # tag 推送：用 tag 名作为 release 名称（正式版）
  # master / 手动触发：用 latest 作为 tag（覆盖式更新）
  release:
    name: Create GitHub Release
    needs: [build-windows, build-android, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: List downloaded artifacts
        run: find dist -type f

      - name: Determine release tag and name
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # push tag v*：用 tag 名作为 release，标记为正式版（会显示在首页"Latest release"区）
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "release_name=LearnSpark ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "override=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            # push master / 手动触发：把"latest"作为 release 名（不用 tag 概念，避免污染 tags 列表）
            # GitHub 用 release 的 name 来识别 Latest，name="latest" 时会显示在首页"Latest release"区
            echo "tag_name=__skip__" >> "$GITHUB_OUTPUT"
            echo "release_name=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "override=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing latest release
        if: steps.meta.outputs.override == 'true'
        continue-on-error: true
        run: |
          # 删除已存在的 latest release，便于重建（不影响 tags 页）
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body: |
            ## LearnSpark ${{ steps.meta.outputs.release_name }}

            构建自 commit `${{ github.sha }}`（${{ github.event_name }}，${{ github.ref }}）。

            包含产物：

            ### Desktop
            - **LearnSpark-1.0.0.exe** — Windows 桌面客户端（双击即用，无需安装）
            - **LearnSpark-1.0.0.deb** — Debian/Ubuntu Linux 安装包（`sudo dpkg -i LearnSpark-1.0.0.deb`）
            - **LearnSpark-1.0.0-linux.tar.gz** — Linux 通用压缩包（解压即用）

            ### Android
            - **LearnSpark-1.0.0.apk** — Android 客户端（传手机安装）

            使用方法：先在 PC 端启动服务端（`java -jar server-1.0.0.jar`），
            然后双击 EXE / 安装 DEB / 解压 tar.gz 启动桌面客户端。
          files: |
            dist/learnspark-desktop-exe/LearnSpark-1.0.0.exe
            dist/learnspark-android-apk/LearnSpark-1.0.0.apk
            dist/learnspark-linux-deb/LearnSpark-1.0.0.deb
            dist/learnspark-linux-tar/LearnSpark-1.0.0-linux.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          fail_on_unmatched_files: false
          make_latest: ${{ steps.meta.outputs.make_latest }}
