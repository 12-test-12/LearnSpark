name: CI Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:        # 允许手动触发（即使 push 后也想再跑一次）

jobs:
  build:
    name: Build Desktop + Android
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        shell: bash
        working-directory: learnspark-kmp
        run: chmod +x gradlew

      # ---------- Desktop (EXE) ----------
      - name: Package Desktop (EXE)
        shell: bash
        working-directory: learnspark-kmp
        run: ./gradlew.bat :composeApp:packageExe --no-daemon

      - name: Locate EXE artifact
        shell: bash
        run: |
          find learnspark-kmp/composeApp/build/compose/binaries/main -name "*.exe" -type f
          ls -la learnspark-kmp/composeApp/build/compose/binaries/main/exe/ 2>/dev/null || true

      - name: Rename EXE with arch
        shell: bash
        run: |
          cd learnspark-kmp/composeApp/build/compose/binaries/main
          EXE_FILE=$(find . -maxdepth 3 -name "LearnSpark*.exe" -type f | head -1)
          if [ -z "$EXE_FILE" ]; then
            EXE_FILE=$(find . -maxdepth 3 -name "*.exe" -type f | head -1)
          fi
          echo "Found EXE: $EXE_FILE"
          if [ -n "$EXE_FILE" ]; then
            cp "$EXE_FILE" "LearnSpark-1.0.0.exe"
            ls -la "LearnSpark-1.0.0.exe"
          fi

      - name: Upload Desktop EXE
        uses: actions/upload-artifact@v4
        with:
          name: learnspark-desktop-exe
          path: learnspark-kmp/composeApp/build/compose/binaries/main/LearnSpark-1.0.0.exe
          if-no-files-found: error

      # ---------- Android (APK) ----------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble Debug APK
        shell: bash
        working-directory: learnspark-kmp
        run: ./gradlew.bat :composeApp:assembleDebug --no-daemon

      - name: Locate APK
        shell: bash
        run: |
          find learnspark-kmp/composeApp/build/outputs/apk/debug -name "*.apk" -type f

      - name: Copy APK with version
        shell: bash
        run: |
          cd learnspark-kmp/composeApp/build/outputs/apk/debug
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "LearnSpark-1.0.0.apk"
            ls -la "LearnSpark-1.0.0.apk"
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: learnspark-android-apk
          path: learnspark-kmp/composeApp/build/outputs/apk/debug/LearnSpark-1.0.0.apk
          if-no-files-found: error

  # ---------- Linux Desktop (DEB + tar.gz) ----------
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Grant execute permission for gradlew
        working-directory: learnspark-kmp
        run: chmod +x gradlew

      - name: Package Linux DEB
        working-directory: learnspark-kmp
        run: ./gradlew :composeApp:packageDeb --no-daemon

      - name: Package Linux tar.gz
        working-directory: learnspark-kmp
        run: ./gradlew :composeApp:package --no-daemon

      - name: Locate Linux artifacts
        run: |
          echo "=== DEB ==="
          find learnspark-kmp/composeApp/build/compose/binaries/main -name "*.deb" -type f
          echo "=== TarGz ==="
          find learnspark-kmp/composeApp/build/compose/binaries/main -name "*.tar.gz" -type f
          ls -la learnspark-kmp/composeApp/build/compose/binaries/main/

      - name: Copy Linux DEB with version
        run: |
          cd learnspark-kmp/composeApp/build/compose/binaries/main
          DEB_FILE=$(find . -name "*.deb" -type f | head -1)
          if [ -n "$DEB_FILE" ]; then
            cp "$DEB_FILE" "LearnSpark-1.0.0.deb"
            ls -la "LearnSpark-1.0.0.deb"
          fi

      - name: Copy Linux tar.gz with version
        run: |
          cd learnspark-kmp/composeApp/build/compose/binaries/main
          TGZ_FILE=$(find . -name "*.tar.gz" -type f | head -1)
          if [ -n "$TGZ_FILE" ]; then
            cp "$TGZ_FILE" "LearnSpark-1.0.0-linux.tar.gz"
            ls -la "LearnSpark-1.0.0-linux.tar.gz"
          fi

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: learnspark-linux-deb
          path: learnspark-kmp/composeApp/build/compose/binaries/main/LearnSpark-1.0.0.deb
          if-no-files-found: warn

      - name: Upload Linux tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: learnspark-linux-tar
          path: learnspark-kmp/composeApp/build/compose/binaries/main/LearnSpark-1.0.0-linux.tar.gz
          if-no-files-found: warn

  # ---------- Release：仅在 push tag 时触发，自动发布到 GitHub Releases ----------
  release:
    name: Create GitHub Release
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded artifacts
        run: find dist -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LearnSpark ${{ github.ref_name }}
          body: |
            ## LearnSpark ${{ github.ref_name }}

            包含四个产物：

            ### Desktop
            - **LearnSpark-1.0.0.exe** — Windows 桌面客户端（双击即用，无需安装）
            - **LearnSpark-1.0.0.deb** — Debian/Ubuntu Linux 安装包（`sudo dpkg -i LearnSpark-1.0.0.deb`）
            - **LearnSpark-1.0.0-linux.tar.gz** — Linux 通用压缩包（解压即用）

            ### Android
            - **LearnSpark-1.0.0.apk** — Android 客户端（传手机安装）

            使用方法：先在 PC 端启动服务端（`java -jar server-1.0.0.jar`），
            然后双击 EXE / 安装 DEB / 解压 tar.gz 启动桌面客户端。
          files: |
            dist/learnspark-desktop-exe/LearnSpark-1.0.0.exe
            dist/learnspark-android-apk/LearnSpark-1.0.0.apk
            dist/learnspark-linux-deb/LearnSpark-1.0.0.deb
            dist/learnspark-linux-tar/LearnSpark-1.0.0-linux.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
