name: Docker Image

# 阶段 3.4：后端 Docker 镜像发布
# - tag v*.*.* → 推送 learnspark/server:<tag> + learnspark/server:latest
# - workflow_dispatch 手动触发可指定自定义 tag

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (defaults to "manual-<sha>")'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push Server Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="manual-${GITHUB_SHA::8}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: learnspark-kmp
          file: learnspark-kmp/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/learnspark-server:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/learnspark-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
