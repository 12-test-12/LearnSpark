name: Release

# 阶段 3.4：双端发布
# - 推送 v*.*.* tag 自动触发
# - 也支持 workflow_dispatch 手动触发（仅产出 artifact，不创建 GitHub Release）
# - 产出：
#   1) Android release APK + AAB（可选签名）
#   2) Desktop 原生安装包（MSI / DMG / DEB）
#   3) 后端 server bootJar
#   4) 上传 artifacts，并在 tag 触发时创建 GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version label (e.g. 1.0.0-rc1). Used in artifact names only.'
        required: false
        default: 'manual'

permissions:
  contents: write   # 用于创建 GitHub Release
  actions: read

jobs:
  # ============================================================
  # Job 1: Desktop native installers (Windows / macOS / Linux)
  # ============================================================
  desktop-native:
    name: Desktop Native (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: msi
            artifact: LearnSpark-windows-x64
          - os: macos-latest
            target: dmg
            artifact: LearnSpark-macos-x64
          - os: ubuntu-latest
            target: deb
            artifact: LearnSpark-linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build ${{ matrix.target }} package
        working-directory: learnspark-kmp
        shell: bash
        run: ./gradlew :composeApp:package${{ matrix.target }} --no-daemon --console=plain --stacktrace

      - name: Locate package
        id: locate
        working-directory: learnspark-kmp
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            find composeApp/build/compose/binaries/main -name "*.msi" -type f
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            find composeApp/build/compose/binaries/main -name "*.dmg" -type f
          else
            find composeApp/build/compose/binaries/main -name "*.deb" -type f
          fi
          # 同时收集 tar/zip 之类的备用分发包
          ls -la composeApp/build/compose/binaries/main/ || true

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            learnspark-kmp/composeApp/build/compose/binaries/main/**/*.msi
            learnspark-kmp/composeApp/build/compose/binaries/main/**/*.dmg
            learnspark-kmp/composeApp/build/compose/binaries/main/**/*.deb
            learnspark-kmp/composeApp/build/compose/binaries/main/**/*.tar.gz
          if-no-files-found: warn
          retention-days: 30

  # ============================================================
  # Job 2: Desktop uber-jar (跨平台 fallback，便于 CI 烟雾测试)
  # ============================================================
  desktop-jar:
    name: Desktop Uber Jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build Desktop Uber Jar
        working-directory: learnspark-kmp
        run: ./gradlew :composeApp:packageUberJarForCurrentOS --no-daemon --console=plain --stacktrace

      - name: Verify main class
        working-directory: learnspark-kmp
        run: |
          jar tf composeApp/build/compose/jars/*.jar | grep -q "com/learnspark/MainKt" \
            && echo "Main-Class 验证通过" \
            || (echo "Main-Class 缺失！" && exit 1)

      - name: Upload uber-jar
        uses: actions/upload-artifact@v4
        with:
          name: LearnSpark-desktop-jar
          path: learnspark-kmp/composeApp/build/compose/jars/*.jar
          if-no-files-found: error
          retention-days: 30

  # ============================================================
  # Job 3: Android release APK + AAB（需要 keystore secrets）
  # ============================================================
  android:
    name: Android Release
    runs-on: ubuntu-latest
    # 没配签名密钥时仍允许构建 unsigned APK（用 debug 签名），仅跳过 AAB

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      # ----- 注入签名密钥（仅当 secret 已配置）-----
      - name: Decode keystore (secrets.ANDROID_KEYSTORE_BASE64)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: learnspark-kmp
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > learnspark.keystore
          {
            echo "storeFile=$(pwd)/learnspark.keystore"
            echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } > keystore.properties
          echo "keystore.properties 已生成"

      - name: Decode keystore (secrets.ANDROID_KEYSTORE_FILE_BASE64 fallback)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' && secrets.ANDROID_KEYSTORE_FILE_BASE64 != '' }}
        working-directory: learnspark-kmp
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_FILE_BASE64 }}" | base64 -d > learnspark.keystore
          {
            echo "storeFile=$(pwd)/learnspark.keystore"
            echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } > keystore.properties
          echo "keystore.properties (fallback) 已生成"

      - name: No keystore configured
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' && secrets.ANDROID_KEYSTORE_FILE_BASE64 == '' }}
        run: echo "[warn] 未配置 ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_FILE_BASE64，将以 debug 签名构建 release"

      - name: Build APK (release)
        working-directory: learnspark-kmp
        run: ./gradlew :composeApp:assembleRelease --no-daemon --console=plain --stacktrace

      - name: Build AAB (release)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' || secrets.ANDROID_KEYSTORE_FILE_BASE64 != '' }}
        working-directory: learnspark-kmp
        run: ./gradlew :composeApp:bundleRelease --no-daemon --console=plain --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LearnSpark-android-apk
          path: learnspark-kmp/composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' || secrets.ANDROID_KEYSTORE_FILE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: LearnSpark-android-aab
          path: learnspark-kmp/composeApp/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload mapping
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: LearnSpark-android-mapping
          path: learnspark-kmp/composeApp/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore
          retention-days: 90

  # ============================================================
  # Job 4: 后端 server bootJar
  # ============================================================
  server:
    name: Server BootJar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build server bootJar
        working-directory: learnspark-kmp
        run: ./gradlew :server:bootJar --no-daemon --console=plain --stacktrace

      - name: Upload bootJar
        uses: actions/upload-artifact@v4
        with:
          name: LearnSpark-server-bootjar
          path: learnspark-kmp/server/build/libs/*.jar
          if-no-files-found: error
          retention-days: 30

  # ============================================================
  # Job 5: tag 触发时创建 GitHub Release 并汇总所有 artifact
  # ============================================================
  release:
    name: GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - desktop-native
      - desktop-jar
      - android
      - server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show structure
        run: ls -la artifacts/ && find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LearnSpark ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.jar
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
