name: Desktop Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'learnspark-kmp/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'learnspark-kmp/**'
  workflow_dispatch:

jobs:
  desktop-build:
    name: Desktop Uber Jar (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Desktop Uber Jar
        working-directory: learnspark-kmp
        run: ./gradlew :composeApp:packageUberJarForCurrentOS --no-daemon --console=plain --stacktrace

      - name: Upload Uber Jar
        uses: actions/upload-artifact@v4
        with:
          name: LearnSpark-desktop-jar
          path: learnspark-kmp/composeApp/build/compose/jars/*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Verify Main-Class
        working-directory: learnspark-kmp
        run: |
          jar tf composeApp/build/compose/jars/*.jar | grep "com/learnspark/MainKt"
          echo "Main-Class 验证通过"