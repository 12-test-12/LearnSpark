# 阶段 3.2：Nginx 反向代理 + HTTPS 终止配置

# 上游 app-api
upstream learnspark_app_api {
    server app-api:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS 入口
server {
    listen 443 ssl http2;
    server_name _;

    # 证书路径（由 certbot / 部署脚本生成到 ./certs/）
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 阶段 3.2：HTTPS 强化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 大文件上传（阶段 2.2：最大 50MB）
    client_max_body_size 60M;
    client_body_buffer_size 1M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # 上传进度端点
    location /api/v1/knowledge/upload {
        proxy_pass http://learnspark_app_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 透传进度所需头
        proxy_request_buffering off;
    }

    # 通用 API
    location /api/ {
        proxy_pass http://learnspark_app_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # 健康检查（K8s liveness/readiness）
    location /actuator/health {
        proxy_pass http://learnspark_app_api;
        access_log off;
    }
}
