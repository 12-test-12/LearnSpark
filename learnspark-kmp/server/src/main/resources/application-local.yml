# R8：本地开发 profile —— 使用 H2 文件数据库，不需要安装 MySQL
# 启动方式：
#   1. Desktop 应用启动时自动使用此 profile（Main.kt 中 SpringApplication.run）
#   2. 单独运行服务端：gradlew.bat :server:bootRun --args='--spring.profiles.active=local'
#
# 关键差异（与 application.yml 的 api profile 对比）：
#   - 数据源：H2 文件数据库（MySQL 兼容模式），替代 MySQL
#   - Flyway：禁用（迁移脚本含 MySQL 特定语法如 ON UPDATE / FULLTEXT ngram，H2 不兼容）
#   - Hibernate：ddl-auto=update，让 JPA 实体自动建表
#   - 端口：8080，绑定 0.0.0.0 以便手机端通过局域网 IP 访问
spring:
  datasource:
    url: jdbc:h2:file:./data/learnspark;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # R8：让 Hibernate 根据 entity 自动建表，绕过 Flyway 迁移脚本的 MySQL 语法兼容问题
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: false
    show-sql: false
  flyway:
    # R8：禁用 Flyway。迁移脚本 V1~V9 含 MySQL 特定语法（ENGINE=InnoDB / ON UPDATE CURRENT_TIMESTAMP(3) /
    # FULLTEXT...WITH PARSER ngram / ALTER ... AFTER），H2 即使在 MySQL 兼容模式下也无法解析。
    # 生产环境仍用 api profile + MySQL + Flyway。
    enabled: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
  # R8：绑定所有网卡，手机可通过 PC 的局域网 IP 访问
  address: 0.0.0.0
