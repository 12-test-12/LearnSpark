spring:
  application:
    name: learnspark-server
  profiles:
    active: api
  datasource:
    url: jdbc:mysql://localhost:3306/learnspark?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:learnspark}
    password: ${DB_PASSWORD:learnspark}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

# LearnSpark 自定义配置
learnspark:
  auth:
    jwt-secret: ${JWT_SECRET:learnspark-dev-secret-please-change-in-production-256bits}
    access-token-ttl-seconds: 3600          # 1 小时
    refresh-token-ttl-seconds: 2592000      # 30 天
  storage:
    upload-dir: ${UPLOAD_DIR:./data/uploads}
    max-file-size-bytes: 52428800           # 50MB
    sync-threshold-bytes: 1048576          # 1MB：以下走同步，以上走异步
  parser:
    poll-interval-ms: 5000                  # 5 秒轮询
    batch-size: 3                           # 单次最多处理 3 个
    max-retry: 3                            # OCR 失败重试 3 次
    tesseract-data-path: ${TESSDATA_PREFIX:./data/tessdata}
    tesseract-language: chi_sim+eng
  # 阶段 R2：API key at-rest 加密密钥（32 字节，base64 编码）
  # 生产环境必须通过环境变量 LEARNSPARK_AES_KEY 覆盖，禁止使用 dev 默认值
  aes:
    key: ${LEARNSPARK_AES_KEY:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tcGxlYXNlLTI1NmJpdHM=}
  ai:
    # R4a：通用 AI 客户端配置（替代 R2 的 learnspark.ai.deepseek.*）
    # 实际请求 baseUrl 来自 user_ai_configs.base_url 或 AiProviderRegistry 中该 provider 的默认值
    default-base-url: ${AI_DEFAULT_BASE_URL:https://api.deepseek.com/v1}
    timeout-seconds: ${AI_TIMEOUT:30}
    max-retries: 1

logging:
  level:
    root: INFO
    com.learnspark: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
