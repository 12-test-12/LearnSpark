# =============================================================================
# LearnSpark 主配置（所有环境共享的框架配置）
# 环境相关配置（数据源等）放在 application-{profile}.yml
# =============================================================================

server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  profiles:
    active: dev
  application:
    name: learnspark-backend

  # 文件上传
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Jackson
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate          # 由 Flyway 管理表结构，JPA 只校验
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: Asia/Shanghai
        default_batch_fetch_size: 50

  # 邮件（SMTP 提醒）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp
        debug: false
    default-encoding: UTF-8

  # Thymeleaf（仅用于邮件模板渲染，不作为 web 视图）
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false              # 开发期关闭缓存，生产环境可开启

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # 非空库自动建立 baseline
    baseline-version: 0           # baseline 版本设为 0，V1 迁移脚本会被执行

# Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# 应用自定义配置
app:
  # JWT
  jwt:
    secret: ${APP_JWT_SECRET:learnspark-dev-secret-key-please-change-in-production-at-least-32-chars}
    expiration: 86400000          # 24h（毫秒）
    header: Authorization
    prefix: "Bearer "

  # AES 加密主密钥（用于加密用户 AI Key）
  aes:
    secret: ${APP_AES_SECRET:learnspark-aes-key-change-me-32bytes}

  # MinIO
  minio:
    endpoint: ${APP_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${APP_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${APP_MINIO_SECRET_KEY:minioadmin}
    bucket: ${APP_MINIO_BUCKET:learnspark}

  # 文件存储（local=本地目录，minio=对象存储）
  storage:
    type: ${APP_STORAGE_TYPE:local}
    local:
      base-dir: ${APP_STORAGE_LOCAL_DIR:./uploads}

  # 邮件提醒
  reminder:
    mail-from: ${APP_MAIL_FROM:learnspark@noreply.com}
    cron: "0 * * * * ?"        # 每分钟扫描一次
    max-retry: 3               # 发送失败重试次数

  # CORS
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    root: INFO
    com.learnspark: DEBUG
    org.flywaydb: INFO
