<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LearnSpark 每日学习提醒</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f7fa;padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                    <!-- 顶部品牌色条 -->
                    <tr>
                        <td style="background:#18a058;height:4px;font-size:0;line-height:0;">&nbsp;</td>
                    </tr>
                    <!-- 标题区 -->
                    <tr>
                        <td style="padding:32px 40px 16px;">
                            <h1 style="margin:0 0 8px;font-size:22px;color:#18a058;font-weight:600;">✨ LearnSpark 每日学习提醒</h1>
                            <p style="margin:0;color:#909399;font-size:13px;" th:text="${'你好，' + data.nickname + '！今天是 ' + #temporals.format(data.today, 'yyyy 年 MM 月 dd 日')}">
                                你好，学习者！今天是 2026-01-01
                            </p>
                        </td>
                    </tr>
                    <!-- 鼓励语 -->
                    <tr>
                        <td style="padding:0 40px 24px;">
                            <div style="background:#f0f9eb;border-left:3px solid #18a058;padding:12px 16px;border-radius:4px;">
                                <p style="margin:0;color:#606266;font-size:14px;line-height:1.6;" th:text="${data.encouragement}">
                                    鼓励语
                                </p>
                            </div>
                        </td>
                    </tr>
                    <!-- 今日任务 -->
                    <tr>
                        <td style="padding:0 40px 8px;">
                            <h2 style="margin:0 0 12px;font-size:16px;color:#303133;">
                                📋 今日待完成任务
                                <span th:if="${data.taskCount > 0}" style="display:inline-block;margin-left:8px;padding:2px 10px;background:#18a058;color:#fff;border-radius:10px;font-size:12px;" th:text="${data.taskCount}">0</span>
                            </h2>
                        </td>
                    </tr>
                    <!-- 任务列表 -->
                    <tr>
                        <td style="padding:0 40px 24px;">
                            <div th:if="${data.tasks != null and !data.tasks.empty}">
                                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                    <tr th:each="task : ${data.tasks}">
                                        <td style="padding:10px 0;border-bottom:1px solid #f0f0f0;">
                                            <div style="display:flex;align-items:center;">
                                                <span style="display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;background:#ecf5ff;color:#409eff;border-radius:50%;font-size:12px;margin-right:12px;" th:if="${task.dayNumber != null}" th:text="${'D' + task.dayNumber}">D1</span>
                                                <span style="display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;background:#f4f4f5;color:#909399;border-radius:50%;font-size:12px;margin-right:12px;" th:unless="${task.dayNumber != null}">•</span>
                                                <div style="flex:1;">
                                                    <p style="margin:0 0 4px;font-size:14px;color:#303133;font-weight:500;" th:text="${task.title}">任务标题</p>
                                                    <p style="margin:0 0 4px;font-size:13px;color:#909399;line-height:1.5;" th:text="${task.description}">任务描述</p>
                                                    <p style="margin:0;font-size:12px;color:#c0c4cc;" th:if="${task.projectName != null and !task.projectName.empty}">
                                                        📚 <span th:text="${task.projectName}">项目名</span>
                                                    </p>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </table>
                            </div>
                            <div th:if="${data.tasks == null or data.tasks.empty}" style="padding:24px;text-align:center;background:#fafafa;border-radius:8px;">
                                <p style="margin:0;color:#909399;font-size:14px;">🎉 今天没有待完成任务，享受自由时光吧！</p>
                            </div>
                        </td>
                    </tr>
                    <!-- 连续打卡（预留） -->
                    <tr th:if="${data.passedDays != null}">
                        <td style="padding:0 40px 24px;">
                            <div style="background:#fff7e6;border-left:3px solid #e6a23c;padding:12px 16px;border-radius:4px;">
                                <p style="margin:0;color:#606266;font-size:14px;">
                                    🔥 已连续学习 <strong th:text="${data.passedDays}">0</strong> 天，继续保持！
                                </p>
                            </div>
                        </td>
                    </tr>
                    <!-- 底部 -->
                    <tr>
                        <td style="padding:24px 40px 32px;border-top:1px solid #f0f0f0;">
                            <p style="margin:0 0 8px;font-size:12px;color:#c0c4cc;line-height:1.6;">
                                这封邮件由 LearnSpark 自动发送，如需关闭提醒请在「设置 → 提醒设置」中关闭开关。
                            </p>
                            <p style="margin:0;font-size:12px;color:#c0c4cc;">
                                <a href="#" style="color:#18a058;text-decoration:none;">LearnSpark 灵犀学习</a> · 让学习更有方向
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
