# =============================================================================
# LearnSpark 基础设施依赖（任务 1.1.4）
#
# 用法：
#   docker compose up -d                        # 启动所有依赖
#   docker compose up -d mysql minio            # 只启动部分
#   docker compose down                         # 停止
#   docker compose down -v                      # 停止并删除数据卷
#
# 端口说明：
#   MySQL:          3306
#   MinIO API:      9000   MinIO Console:  9001
#   Elasticsearch:  9200
#
# 注意：
#   1) 表结构由后端 Flyway 启动时自动迁移，MySQL 容器只负责建空库。
#   2) Elasticsearch 默认关闭安全认证，仅用于开发；生产环境需配置 xpack。
#   3) backend / frontend 服务在任务 1.8.1 加入本文件。
# =============================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: learnspark-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: learnspark
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-allowed-packet=64M
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: learnspark-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${APP_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${APP_MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: learnspark-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=learnspark
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  mysql-data:
  minio-data:
  es-data:
